<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Split Bill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=5" />
  </head>
  <body>
    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <main class="container glass-panel">
      <header>
        <h1>Split Bill</h1>
      </header>

      <section class="receipt-details-section">
        <h2 style="font-size: 1.2rem; margin-bottom: 1rem;">Detail Tambahan Nota</h2>
        <div class="input-group" style="margin-bottom: 1rem;">
          <label for="receiptDiscount">Diskon (Rp)</label>
          <input type="number" id="receiptDiscount" placeholder="Misal: 5000" min="0" />
        </div>
        
        <hr style="border:0; border-top: 1px dashed var(--border-color); margin: 1.5rem 0 1rem 0;">
        <h3 style="font-size: 0.95rem; margin-bottom: 0.75rem; color: var(--text-main);">Biaya Tambahan Lainnya</h3>
        <div id="extraFeesList" style="display:flex; flex-direction:column; gap:0.75rem; margin-bottom: 1rem;">
            <!-- Dynamic extra fee items will go here -->
        </div>
        <button id="addExtraFeeBtn" type="button" class="btn-secondary" style="font-size: 0.85rem; background: transparent; border: 1px dashed var(--border-color); color: var(--primary);">+ Tambah Biaya Lainnya (Pajak, Ongkir, dll)</button>

      </section>

      <section class="orders-section">
        <h2>Daftar Pesanan</h2>
        <div id="personsList">
          <!-- Person item template -->
          <div class="person-item">
            <input
              type="text"
              class="person-name"
              placeholder="Nama (mis: Budi)"
              required
            />
            <input
              type="number"
              class="person-subtotal"
              placeholder="Total Harga Makanan (mis: 50000)"
              min="0"
              required
            />
            <button class="remove-person-btn" type="button" aria-label="Hapus">
              &times;
            </button>
          </div>
        </div>
        <button id="addPersonBtn" type="button" class="btn-secondary">+ Tambah Orang</button>
      </section>

      <button id="calculateBtn" type="button" class="btn-primary">
        <span id="calcBtnText">Hitung Tagihan</span>
        <span id="calcSpinner" class="loader hidden"></span>
      </button>

      <section id="resultSection" class="result-section hidden">
        <h2>Rincian Tagihan</h2>
        <div id="resultContent"></div>
      </section>
    </main>

    <script src="app.js?v=5"></script>
  </body>
</html>
